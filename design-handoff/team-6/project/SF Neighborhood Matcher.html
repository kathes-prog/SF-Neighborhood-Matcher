<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Neighborhood Matcher</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="stylesheet" href="app.css">

  <!-- Leaflet (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* Leaflet tooltip override to match brand */
    .leaflet-tooltip.nm-tooltip {
      background: #111; color: #fff; border: none;
      font-family: var(--font-sans, system-ui);
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      padding: 4px 8px; border-radius: 3px; box-shadow: none;
    }
    .leaflet-tooltip.nm-tooltip::before { display: none; }
    .leaflet-container { font-family: var(--font-sans, system-ui); }

    /* Hide page until React mounts to avoid flash. */
    #root:empty::before {
      content: ''; display: block; height: 100vh; background: #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data + scoring -->
  <script src="data.js"></script>
  <script src="scoring.js"></script>

  <!-- Tweaks (defines useTweaks, TweaksPanel, Tweak* primitives) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="components/Header.jsx"></script>
  <script type="text/babel" src="components/BriefPanel.jsx"></script>
  <script type="text/babel" src="components/MapPanel.jsx"></script>
  <script type="text/babel" src="components/ResultCard.jsx"></script>
  <script type="text/babel" src="components/DetailSheet.jsx"></script>
  <script type="text/babel" src="components/CompareSheet.jsx"></script>

  <!-- Main -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
