<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neighborhood Statistics — SF Neighborhood Matcher</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #1a1a1a;
    line-height: 1.5;
  }

  header {
    background: #1D9E75;
    color: #fff;
    padding: 2rem 2rem 1.5rem;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; }
  header p { opacity: 0.88; margin-top: 0.3rem; font-size: 0.95rem; }

  nav {
    background: #178a64;
    padding: 0 2rem;
    display: flex;
    gap: 0;
  }
  nav a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    padding: 0.6rem 1.1rem;
    font-size: 0.88rem;
    font-weight: 500;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  nav a:hover { color: #fff; }
  nav a.active { color: #fff; border-bottom-color: #fff; }

  .section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #111;
    border-bottom: 2px solid #1D9E75;
    padding-bottom: 0.5rem;
    display: inline-block;
  }

  .corr-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-bottom: 2rem;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid #e0e0e0;
  }
  .corr-table th {
    background: #f3f4f6;
    padding: 0.6rem 0.75rem;
    text-align: left;
    font-weight: 600;
    color: #333;
    border-bottom: 1.5px solid #e0e0e0;
  }
  .corr-table td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid #f0f0f0;
    font-weight: 600;
    text-align: center;
  }
  .corr-table td:first-child { text-align: left; font-weight: 500; color: #444; }
  .corr-table tr:last-child td { border-bottom: none; }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  .chart-box {
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 1.25rem;
    background: #fff;
  }
  .chart-box h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 1rem; color: #333; }
  .chart-box canvas { max-height: 300px; }

  @media (max-width: 768px) {
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>SF Neighborhood Matcher</h1>
  <p>Data-driven insights across 15 San Francisco neighborhoods</p>
</header>

<nav>
  <a href="index.html">Neighborhood Matcher</a>
  <a href="statistics.html" class="active">Neighborhood Statistics</a>
</nav>

<div class="section">
  <div class="section-title">Neighborhood Statistics</div>

  <h3 style="font-size:0.95rem; font-weight:600; margin-bottom:0.75rem; color:#333;">Correlation Matrix</h3>
  <table class="corr-table">
    <thead>
      <tr>
        <th>Variables</th>
        <th>r value</th>
        <th>Interpretation</th>
      </tr>
    </thead>
    <tbody id="corr-body"></tbody>
  </table>

  <div class="charts-row">
    <div class="chart-box">
      <h3>Rent vs. Crime Rate</h3>
      <canvas id="chart-rent-crime"></canvas>
    </div>
    <div class="chart-box">
      <h3>Walkability vs. Rent</h3>
      <canvas id="chart-walk-rent"></canvas>
    </div>
  </div>
</div>

<script>
const NEIGHBORHOOD_DATA = {
  "Mission":        { "avg_rent": 3295, "crime_rate": 100, "noise_complaints": 100, "parks_nearby": 3, "transit_score": 88, "nightlife_density": 91, "parking_difficulty": 65, "walkability": 94, "lat": 37.7599, "lng": -122.4148 },
  "Marina":         { "avg_rent": 3900, "crime_rate": 16,  "noise_complaints": 16,  "parks_nearby": 5, "transit_score": 72, "nightlife_density": 65, "parking_difficulty": 70, "walkability": 85, "lat": 37.8030, "lng": -122.4364 },
  "SoMa":           { "avg_rent": 3792, "crime_rate": 86,  "noise_complaints": 41,  "parks_nearby": 2, "transit_score": 95, "nightlife_density": 78, "parking_difficulty": 80, "walkability": 90, "lat": 37.7785, "lng": -122.3948 },
  "Noe Valley":     { "avg_rent": 3695, "crime_rate": 0,   "noise_complaints": 2,   "parks_nearby": 4, "transit_score": 70, "nightlife_density": 40, "parking_difficulty": 45, "walkability": 80, "lat": 37.7502, "lng": -122.4333 },
  "Haight-Ashbury": { "avg_rent": 3100, "crime_rate": 4,   "noise_complaints": 16,  "parks_nearby": 5, "transit_score": 80, "nightlife_density": 70, "parking_difficulty": 60, "walkability": 88, "lat": 37.7692, "lng": -122.4481 },
  "Pacific Heights": { "avg_rent": 4200, "crime_rate": 6,  "noise_complaints": 8,   "parks_nearby": 4, "transit_score": 68, "nightlife_density": 35, "parking_difficulty": 55, "walkability": 82, "lat": 37.7925, "lng": -122.4382 },
  "Richmond":       { "avg_rent": 2900, "crime_rate": 8,   "noise_complaints": 13,  "parks_nearby": 6, "transit_score": 74, "nightlife_density": 45, "parking_difficulty": 35, "walkability": 78, "lat": 37.7785, "lng": -122.4830 },
  "Sunset":         { "avg_rent": 2800, "crime_rate": 18,  "noise_complaints": 18,  "parks_nearby": 5, "transit_score": 68, "nightlife_density": 30, "parking_difficulty": 30, "walkability": 72, "lat": 37.7527, "lng": -122.4877 },
  "Hayes Valley":   { "avg_rent": 4060, "crime_rate": 16,  "noise_complaints": 22,  "parks_nearby": 2, "transit_score": 90, "nightlife_density": 80, "parking_difficulty": 75, "walkability": 95, "lat": 37.7759, "lng": -122.4245 },
  "Tenderloin":     { "avg_rent": 2547, "crime_rate": 98,  "noise_complaints": 65,  "parks_nearby": 1, "transit_score": 92, "nightlife_density": 60, "parking_difficulty": 85, "walkability": 88, "lat": 37.7839, "lng": -122.4128 },
  "Castro":         { "avg_rent": 3400, "crime_rate": 16,  "noise_complaints": 22,  "parks_nearby": 3, "transit_score": 82, "nightlife_density": 85, "parking_difficulty": 60, "walkability": 92, "lat": 37.7609, "lng": -122.4350 },
  "Bernal Heights": { "avg_rent": 3200, "crime_rate": 10,  "noise_complaints": 8,   "parks_nearby": 4, "transit_score": 65, "nightlife_density": 38, "parking_difficulty": 40, "walkability": 75, "lat": 37.7431, "lng": -122.4156 },
  "North Beach":    { "avg_rent": 3600, "crime_rate": 19,  "noise_complaints": 10,  "parks_nearby": 2, "transit_score": 85, "nightlife_density": 88, "parking_difficulty": 82, "walkability": 96, "lat": 37.8061, "lng": -122.4103 },
  "Potrero Hill":   { "avg_rent": 3450, "crime_rate": 5,   "noise_complaints": 7,   "parks_nearby": 3, "transit_score": 70, "nightlife_density": 42, "parking_difficulty": 38, "walkability": 76, "lat": 37.7590, "lng": -122.4003 },
  "Outer Mission":  { "avg_rent": 2600, "crime_rate": 2,   "noise_complaints": 0,   "parks_nearby": 3, "transit_score": 66, "nightlife_density": 35, "parking_difficulty": 32, "walkability": 70, "lat": 37.7214, "lng": -122.4397 }
};

function pearson(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((a, b) => a + b, 0) / n;
  const my = ys.reduce((a, b) => a + b, 0) / n;
  let num = 0, dx2 = 0, dy2 = 0;
  for (let i = 0; i < n; i++) {
    const dx = xs[i] - mx, dy = ys[i] - my;
    num += dx * dy; dx2 += dx * dx; dy2 += dy * dy;
  }
  return num / Math.sqrt(dx2 * dy2);
}

function corrColor(r) {
  const abs = Math.abs(r);
  if (r >= 0) return `rgba(30, 100, 200, ${0.1 + abs * 0.55})`;
  return `rgba(220, 60, 60, ${0.1 + abs * 0.55})`;
}

function linReg(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for (let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)**2;}
  const slope = num/den;
  const intercept = my - slope*mx;
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  return [{x:minX, y:slope*minX+intercept},{x:maxX, y:slope*maxX+intercept}];
}

const data = NEIGHBORHOOD_DATA;
const names = Object.keys(data);
const get = field => names.map(n => data[n][field]);

const rents    = get('avg_rent');
const crimes   = get('crime_rate');
const walks    = get('walkability');
const transits = get('transit_score');
const noises   = get('noise_complaints');
const nightlife = get('nightlife_density');

// Correlation matrix
const pairs = [
  { label: 'Rent vs. Crime rate',      xs: rents,     ys: crimes    },
  { label: 'Rent vs. Walkability',     xs: rents,     ys: walks     },
  { label: 'Rent vs. Transit score',   xs: rents,     ys: transits  },
  { label: 'Crime rate vs. Noise',     xs: crimes,    ys: noises    },
  { label: 'Nightlife vs. Noise',      xs: nightlife, ys: noises    },
  { label: 'Walkability vs. Transit',  xs: walks,     ys: transits  },
];

const tbody = document.getElementById('corr-body');
pairs.forEach(p => {
  const r = pearson(p.xs, p.ys);
  const strength = Math.abs(r) > 0.7 ? 'Strong' : Math.abs(r) > 0.4 ? 'Moderate' : 'Weak';
  const dir = r >= 0 ? 'positive' : 'negative';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${p.label}</td>
    <td style="background:${corrColor(r)}; color:#111;">${r.toFixed(3)}</td>
    <td style="color:#555;">${strength} ${dir}</td>`;
  tbody.appendChild(tr);
});

// Chart 1: Rent vs Crime
const ctx1 = document.getElementById('chart-rent-crime').getContext('2d');
new Chart(ctx1, {
  data: {
    datasets: [
      {
        type: 'scatter',
        label: 'Neighborhood',
        data: names.map(n => ({ x: data[n].avg_rent, y: data[n].crime_rate, label: n })),
        backgroundColor: '#1D9E75',
        pointRadius: 6,
      },
      {
        type: 'line',
        label: 'Trend',
        data: linReg(rents, crimes),
        borderColor: '#E24B4A',
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0,
      }
    ]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const raw = ctx.raw;
            return raw.label ? `${raw.label}: $${raw.x}, crime ${raw.y}` : 'Trend';
          }
        }
      }
    },
    scales: {
      x: { title: { display: true, text: 'Avg Rent ($)' } },
      y: { title: { display: true, text: 'Crime Rate' } },
    }
  }
});

// Chart 2: Walkability vs Rent
const ctx2 = document.getElementById('chart-walk-rent').getContext('2d');
new Chart(ctx2, {
  data: {
    datasets: [
      {
        type: 'scatter',
        label: 'Neighborhood',
        data: names.map(n => ({ x: data[n].walkability, y: data[n].avg_rent, label: n })),
        backgroundColor: '#1D9E75',
        pointRadius: 6,
      },
      {
        type: 'line',
        label: 'Trend',
        data: linReg(walks, rents),
        borderColor: '#E24B4A',
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0,
      }
    ]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const raw = ctx.raw;
            return raw.label ? `${raw.label}: walk ${raw.x}, $${raw.y}` : 'Trend';
          }
        }
      }
    },
    scales: {
      x: { title: { display: true, text: 'Walkability' } },
      y: { title: { display: true, text: 'Avg Rent ($)' } },
    }
  }
});
</script>
</body>
</html>
